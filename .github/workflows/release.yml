name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract standalone script
        run: |
          sed -n "/^#!/,/^EOF$/p" restore | head -n -1 > ra1n
          chmod +x ra1n

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RA1N ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: ra1n
